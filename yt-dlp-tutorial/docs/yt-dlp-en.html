            })(() => window.markmap,null,{"content":"yt-dlp Complete Usage Guide","children":[{"content":"Quick Reference","children":[{"content":"<table data-lines=\"6,17\">\n<thead data-lines=\"6,7\">\n<tr data-lines=\"6,7\">\n<th>Usage</th>\n<th>Command</th>\n</tr>\n</thead>\n<tbody data-lines=\"8,17\">\n<tr data-lines=\"8,9\">\n<td>Download video (best quality)</td>\n<td><code>yt-dlp &quot;VIDEO_URL&quot;</code></td>\n</tr>\n<tr data-lines=\"9,10\">\n<td>Download and convert to MP3</td>\n<td><code>yt-dlp -x --audio-format mp3 &quot;VIDEO_URL&quot;</code></td>\n</tr>\n<tr data-lines=\"10,11\">\n<td>List available formats</td>\n<td><code>yt-dlp -F &quot;VIDEO_URL&quot;</code></td>\n</tr>\n<tr data-lines=\"11,12\">\n<td>Download specific quality (e.g. 720p)</td>\n<td><code>yt-dlp -f &quot;bestvideo[height&lt;=720]+bestaudio&quot; &quot;VIDEO_URL&quot;</code></td>\n</tr>\n<tr data-lines=\"12,13\">\n<td>Download with subtitles</td>\n<td><code>yt-dlp --write-subs --sub-langs zh-Hans,en &quot;VIDEO_URL&quot;</code></td>\n</tr>\n<tr data-lines=\"13,14\">\n<td>Download entire playlist</td>\n<td><code>yt-dlp &quot;PLAYLIST_URL&quot;</code></td>\n</tr>\n<tr data-lines=\"14,15\">\n<td>Download using browser cookies</td>\n<td><code>yt-dlp --cookies-from-browser chrome &quot;VIDEO_URL&quot;</code></td>\n</tr>\n<tr data-lines=\"15,16\">\n<td>Specify output path and filename</td>\n<td><code>yt-dlp -o &quot;~/Downloads/%(title)s.%(ext)s&quot; &quot;VIDEO_URL&quot;</code></td>\n</tr>\n<tr data-lines=\"16,17\">\n<td>Update yt-dlp</td>\n<td><code>yt-dlp -U</code></td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"6,17"}}],"payload":{"tag":"h2","lines":"4,5"}},{"content":"Comparison with Other Download Tools","children":[{"content":"<table data-lines=\"20,27\">\n<thead data-lines=\"20,21\">\n<tr data-lines=\"20,21\">\n<th>Feature</th>\n<th>yt-dlp</th>\n<th>youtube-dl (Original)</th>\n<th>lux</th>\n<th>BBDown</th>\n</tr>\n</thead>\n<tbody data-lines=\"22,27\">\n<tr data-lines=\"22,23\">\n<td>Supported Sites</td>\n<td>&#x2b50;&#x2b50;&#x2b50;&#x2b50;&#x2b50; Thousands</td>\n<td>&#x2b50;&#x2b50;&#x2b50;&#x2b50; Many</td>\n<td>&#x2b50;&#x2b50;&#x2b50; Moderate</td>\n<td>&#x2b50; Bilibili Only</td>\n</tr>\n<tr data-lines=\"23,24\">\n<td>Update Frequency</td>\n<td>&#x2b50;&#x2b50;&#x2b50;&#x2b50;&#x2b50; Very Active</td>\n<td>&#x2b50; Nearly Abandoned</td>\n<td>&#x2b50;&#x2b50;&#x2b50; Average</td>\n<td>&#x2b50;&#x2b50;&#x2b50; Average</td>\n</tr>\n<tr data-lines=\"24,25\">\n<td>Download Speed</td>\n<td>&#x2b50;&#x2b50;&#x2b50;&#x2b50;&#x2b50; Multi-threaded</td>\n<td>&#x2b50;&#x2b50; Slow</td>\n<td>&#x2b50;&#x2b50;&#x2b50;&#x2b50; Fast</td>\n<td>&#x2b50;&#x2b50;&#x2b50;&#x2b50; Fast</td>\n</tr>\n<tr data-lines=\"25,26\">\n<td>Post-processing</td>\n<td>&#x2b50;&#x2b50;&#x2b50;&#x2b50;&#x2b50; Most Powerful</td>\n<td>&#x2b50;&#x2b50;&#x2b50; Basic</td>\n<td>&#x2b50;&#x2b50; Weak</td>\n<td>&#x2b50;&#x2b50; Weak</td>\n</tr>\n<tr data-lines=\"26,27\">\n<td>Bilibili Support</td>\n<td>&#x2b50;&#x2b50;&#x2b50;&#x2b50; Good</td>\n<td>&#x2b50;&#x2b50; Average</td>\n<td>&#x2b50;&#x2b50;&#x2b50;&#x2b50; Good</td>\n<td>&#x2b50;&#x2b50;&#x2b50;&#x2b50;&#x2b50; Best</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"20,27"}}],"payload":{"tag":"h2","lines":"18,19"}},{"content":"1. Installation","children":[{"content":"macOS","children":[{"content":"<pre data-lines=\"33,43\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Homebrew (Recommended)</span>\nbrew install yt-dlp\n\n<span class=\"hljs-comment\"># pip</span>\npip3 install -U yt-dlp\n\n<span class=\"hljs-comment\"># Install ffmpeg (required for merging video/audio streams and format conversion)</span>\nbrew install ffmpeg\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"33,43"}}],"payload":{"tag":"h3","lines":"32,33"}},{"content":"Windows","children":[{"content":"<pre data-lines=\"45,55\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Scoop</span>\nscoop install yt-dlp\n\n<span class=\"hljs-comment\"># pip</span>\npip install -U yt-dlp\n\n<span class=\"hljs-comment\"># Or download the executable directly</span>\n<span class=\"hljs-comment\"># https://github.com/yt-dlp/yt-dlp/releases/latest</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"45,55"}}],"payload":{"tag":"h3","lines":"44,45"}},{"content":"Linux","children":[{"content":"<pre data-lines=\"57,65\"><code class=\"language-bash\"><span class=\"hljs-comment\"># pip</span>\npip3 install -U yt-dlp\n\n<span class=\"hljs-comment\"># Or download the binary</span>\ncurl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp\n<span class=\"hljs-built_in\">chmod</span> a+rx /usr/local/bin/yt-dlp\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"57,65"}}],"payload":{"tag":"h3","lines":"56,57"}},{"content":"Update","children":[{"content":"<pre data-lines=\"67,70\"><code class=\"language-bash\">yt-dlp -U\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"67,70"}}],"payload":{"tag":"h3","lines":"66,67"}}],"payload":{"tag":"h2","lines":"30,31"}},{"content":"2. Basic Usage","children":[{"content":"2.1 Download a Video (Default Best Quality)","children":[{"content":"<pre data-lines=\"76,79\"><code class=\"language-bash\">yt-dlp <span class=\"hljs-string\">&quot;https://www.youtube.com/watch?v=dQw4w9WgXcQ&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"76,79"}}],"payload":{"tag":"h3","lines":"75,76"}},{"content":"2.2 Specify Output Path and Filename","children":[{"content":"<pre data-lines=\"81,91\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Save to Downloads directory with &quot;VideoTitle.ext&quot; naming</span>\nyt-dlp -o <span class=\"hljs-string\">&quot;~/Downloads/%(title)s.%(ext)s&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Include upload date in the filename</span>\nyt-dlp -o <span class=\"hljs-string\">&quot;~/Downloads/%(upload_date)s-%(title)s.%(ext)s&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Create subdirectories by channel name</span>\nyt-dlp -o <span class=\"hljs-string\">&quot;~/Downloads/%(channel)s/%(title)s.%(ext)s&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"81,91"}}],"payload":{"tag":"h3","lines":"80,81"}},{"content":"2.3 Common Output Template Variables","children":[{"content":"<table data-lines=\"94,104\">\n<thead data-lines=\"94,95\">\n<tr data-lines=\"94,95\">\n<th>Variable</th>\n<th>Description</th>\n<th>Example</th>\n</tr>\n</thead>\n<tbody data-lines=\"96,104\">\n<tr data-lines=\"96,97\">\n<td><code>%(title)s</code></td>\n<td>Video title</td>\n<td>Never Gonna Give You Up</td>\n</tr>\n<tr data-lines=\"97,98\">\n<td><code>%(id)s</code></td>\n<td>Video ID</td>\n<td>dQw4w9WgXcQ</td>\n</tr>\n<tr data-lines=\"98,99\">\n<td><code>%(ext)s</code></td>\n<td>File extension</td>\n<td>mp4</td>\n</tr>\n<tr data-lines=\"99,100\">\n<td><code>%(channel)s</code></td>\n<td>Channel name</td>\n<td>Rick Astley</td>\n</tr>\n<tr data-lines=\"100,101\">\n<td><code>%(upload_date)s</code></td>\n<td>Upload date</td>\n<td>20091025</td>\n</tr>\n<tr data-lines=\"101,102\">\n<td><code>%(resolution)s</code></td>\n<td>Resolution</td>\n<td>1920x1080</td>\n</tr>\n<tr data-lines=\"102,103\">\n<td><code>%(duration)s</code></td>\n<td>Duration (seconds)</td>\n<td>213</td>\n</tr>\n<tr data-lines=\"103,104\">\n<td><code>%(playlist_index)s</code></td>\n<td>Playlist index</td>\n<td>01</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"94,104"}}],"payload":{"tag":"h3","lines":"92,93"}}],"payload":{"tag":"h2","lines":"73,74"}},{"content":"3. Video Format Selection","children":[{"content":"3.1 List All Available Formats","children":[{"content":"<pre data- 0</span>x1080   <span class=\"hljs-number\">25</span>   &#x2502;  <span class=\"hljs-number\">210.76</span>KiB <span class=\"hljs-number\">110</span>k   https  &#x2502; vp9           <span class=\"hljs-selector-tag\">video</span> only\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"115,123"}}],"payload":{"tag":"h3","lines":"109,110"}},{"content":"3.2 Download a Specific Format","children":[{"content":"<pre data-lines=\"125,135\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Download by format ID (e.g. 137 from the list above)</span>\nyt-dlp -f 137 <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Download best video + best audio, merge automatically</span>\nyt-dlp -f <span class=\"hljs-string\">&quot;bestvideo+bestaudio/best&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Download best MP4 format</span>\nyt-dlp -f <span class=\"hljs-string\">&quot;bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"125,135"}}],"payload":{"tag":"h3","lines":"124,125"}},{"content":"3.3 Limit Video Quality","children":[{"content":"<pre data-lines=\"137,147\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Max 720p</span>\nyt-dlp -f <span class=\"hljs-string\">&quot;bestvideo[height&lt;=720]+bestaudio/best[height&lt;=720]&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Max 1080p</span>\nyt-dlp -f <span class=\"hljs-string\">&quot;bestvideo[height&lt;=1080]+bestaudio/best[height&lt;=1080]&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Max 4K</span>\nyt-dlp -f <span class=\"hljs-string\">&quot;bestvideo[height&lt;=2160]+bestaudio/best[height&lt;=2160]&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"137,147"}}],"payload":{"tag":"h3","lines":"136,137"}},{"content":"3.4 Prefer Specific Codecs","children":[{"content":"<pre data-lines=\"149,156\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Prefer H.264 codec (best compatibility)</span>\nyt-dlp -f <span class=\"hljs-string\">&quot;bestvideo[vcodec^=avc1]+bestaudio/best&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Prefer VP9 codec (smaller file size)</span>\nyt-dlp -f <span class=\"hljs-string\">&quot;bestvideo[vcodec^=vp9]+bestaudio/best&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"149,156"}}],"payload":{"tag":"h3","lines":"148,149"}},{"content":"3.5 Format Sorting (Advanced)","children":[{"content":"<pre data-lines=\"158,165\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Prioritize: resolution &gt; codec &gt; file size</span>\nyt-dlp -S <span class=\"hljs-string\">&quot;res,codec,filesize&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Prefer the highest quality with H.264 codec</span>\nyt-dlp -S <span class=\"hljs-string\">&quot;codec:h264&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"158,165"}}],"payload":{"tag":"h3","lines":"157,158"}}],"payload":{"tag":"h2","lines":"107,108"}},{"content":"4. Audio Download","children":[{"content":"4.1 Extract Audio Only","children":[{"content":"<pre data-lines=\"171,184\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Extract audio in default format</span>\nyt-dlp -x <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Extract audio and convert to MP3</span>\nyt-dlp -x --audio-format mp3 <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Extract audio and convert to FLAC (lossless)</span>\nyt-dlp -x --audio-format flac <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Specify audio quality (0 = best, 10 = worst)</span>\nyt-dlp -x --audio-format mp3 --audio-quality 0 <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"171,184"}}],"payload":{"tag":"h3","lines":"170,171"}},{"content":"4.2 Supported Audio Formats","children":[],"payload":{"tag":"h3","lines":"185,186"}}],"payload":{"tag":"h2","lines":"168,169"}},{"content":"5. Subtitle Download","children":[{"content":"5.1 Download Subtitles","children":[{"content":"<pre data-lines=\"193,206\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Download all available subtitles</span>\nyt-dlp --write-subs <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Download subtitles for specific languages (Chinese and English)</span>\nyt-dlp --write-subs --sub-langs <span class=\"hljs-string\">&quot;zh-Hans,en&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Download auto-generated subtitles</span>\nyt-dlp --write-auto-subs --sub-langs <span class=\"hljs-string\">&quot;zh-Hans&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Download subtitles only (skip video download)</span>\nyt-dlp --write-subs --sub-langs <span class=\"hljs-string\">&quot;zh-Hans,en&quot;</span> --skip-download <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"193,206"}}],"payload":{"tag":"h3","lines":"192,193"}},{"content":"5.2 Convert Subtitle Format","children":[{"content":"<pre data-lines=\"208,212\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Convert to SRT format</span>\nyt-dlp --write-subs --sub-format srt --convert-subs srt <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"208,212"}}],"payload":{"tag":"h3","lines":"207,208"}},{"content":"5.3 Embed Subtitles into Video","children":[{"content":"<pre data-lines=\"214,217\"><code class=\"language-bash\">yt-dlp --write-subs --sub-langs <span class=\"hljs-string\">&quot;zh-Hans,en&quot;</span> --embed-subs <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"214,217"}}],"payload":{"tag":"h3","lines":"213,214"}}],"payload":{"tag":"h2","lines":"190,191"}},{"content":"6. Playlist Handling","children":[{"content":"6.1 Download an Entire Playlist","children":[{"content":"<pre data-lines=\"223,226\"><code class=\"language-bash\">yt-dlp <span class=\"hljs-string\">&quot;https://www.youtube.com/playlist?list=PLxxxxxx&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"223,226"}}],"payload":{"tag":"h3","lines":"222,223"}},{"content":"6.2 Specify Download Range","children":[{"content":"<pre data-lines=\"228,238\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Download only items 3 through 7</span>\nyt-dlp --playlist-start 3 --playlist-end 7 <span class=\"hljs-string\">&quot;PLAYLIST_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Download only items 1, 3, and 5</span>\nyt-dlp --playlist-items 1,3,5 <span class=\"hljs-string\">&quot;PLAYLIST_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Download items 1 to 10, every other item</span>\nyt-dlp --playlist-items 1:10:2 <span class=\"hljs-string\">&quot;PLAYLIST_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"228,238"}}],"payload":{"tag":"h3","lines":"227,228"}},{"content":"6.3 Numbered Filenames for Playlists","children":[{"content":"<pre data-lines=\"240,244\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Filenames with index, e.g. &quot;01-Title.mp4&quot;</span>\nyt-dlp -o <span class=\"hljs-string\">&quot;%(playlist_index)02d-%(title)s.%(ext)s&quot;</span> <span class=\"hljs-string\">&quot;PLAYLIST_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"240,244"}}],"payload":{"tag":"h3","lines":"239,240"}},{"content":"6.4 Disable Playlist Download (Single Video Only)","children":[{"content":"<pre data-lines=\"246,249\"><code class=\"language-bash\">yt-dlp --no-playlist <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"246,249"}}],"payload":{"tag":"h3","lines":"245,246"}}],"payload":{"tag":"h2","lines":"220,221"}},{"content":"7. Download Limits &amp; Controls","children":[{"content":"7.1 Rate Limiting","children":[{"content":"<pre data-lines=\"255,262\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Limit to 1MB/s</span>\nyt-dlp -r 1M <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Limit to 500KB/s</span>\nyt-dlp -r 500K <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"255,262"}}],"payload":{"tag":"h3","lines":"254,255"}},{"content":"7.2 File Size Limit","children":[{"content":"<pre data-lines=\"264,268\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Only download formats smaller than 100MB</span>\nyt-dlp -f <span class=\"hljs-string\">&quot;best[filesize&lt;100M]&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"264,268"}}],"payload":{"tag":"h3","lines":"263,264"}},{"content":"7.3 Retries &amp; Timeout","children":[{"content":"<pre data-lines=\"270,280\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Retry up to 10 times</span>\nyt-dlp --retries 10 <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Set connection timeout to 30 seconds</span>\nyt-dlp --socket-timeout 30 <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Set fragment retries</span>\nyt-dlp --fragment-retries 10 <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"270,280"}}],"payload":{"tag":"h3","lines":"269,270"}},{"content":"7.4 Resume Interrupted Downloads","children":[{"content":"<pre data-lines=\"282,286\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Continue a previously interrupted download</span>\nyt-dlp -c <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"282,286"}}],"payload":{"tag":"h3","lines":"281,282"}},{"content":"7.5 Skip Already Downloaded Files","children":[{"content":"<pre data-lines=\"288,292\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Use a download archive to avoid re-downloading</span>\nyt-dlp --download-archive downloaded.txt <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"288,292"}}],"payload":{"tag":"h3","lines":"287,288"}},{"content":"7.6 Proxy Configuration","children":[{"content":"<pre data-lines=\"294,301\"><code class=\"language-bash\"><span class=\"hljs-comment\"># HTTP proxy</span>\nyt-dlp --proxy http://127.0.0.1:7890 <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># SOCKS5 proxy</span>\nyt-dlp --proxy socks5://127.0.0.1:1080 <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"294,301"}}],"payload":{"tag":"h3","lines":"293,294"}}],"payload":{"tag":"h2","lines":"252,253"}},{"content":"8. Cookies &amp; Authentication","children":[{"content":"8.1 Auto-extract Cookies from Browser","children":[{"content":"<pre data-lines=\"307,320\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Chrome</span>\nyt-dlp --cookies-from-browser chrome <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Safari</span>\nyt-dlp --cookies-from-browser safari <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Edge</span>\nyt-dlp --cookies-from-browser edge <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Firefox</span>\nyt-dlp --cookies-from-browser firefox <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"307,320"}}],"payload":{"tag":"h3","lines":"306,307"}},{"content":"8.2 Use a Cookie File","children":[{"content":"<pre data-lines=\"322,325\"><code class=\"language-bash\">yt-dlp --cookies cookies.txt <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"322,325"}}],"payload":{"tag":"h3","lines":"321,322"}},{"content":"8.3 Username &amp; Password Login","children":[{"content":"<pre data-lines=\"327,330\"><code class=\"language-bash\">yt-dlp -u USERNAME -p PASSWORD <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"327,330"}}],"payload":{"tag":"h3","lines":"326,327"}}],"payload":{"tag":"h2","lines":"304,305"}},{"content":"9. Post-processing","children":[{"content":"9.1 Embed Metadata","children":[{"content":"<pre data-lines=\"336,349\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Embed thumbnail</span>\nyt-dlp --embed-thumbnail <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Embed metadata (title, description, date, etc.)</span>\nyt-dlp --embed-metadata <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Embed chapter information</span>\nyt-dlp --embed-chapters <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Embed all metadata at once</span>\nyt-dlp --embed-thumbnail --embed-metadata --embed-chapters --embed-subs <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"336,349"}}],"payload":{"tag":"h3","lines":"335,336"}},{"content":"9.2 Video Conversion","children":[{"content":"<pre data-lines=\"351,358\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Remux to MP4 container (no re-encoding, fast)</span>\nyt-dlp --remux-video mp4 <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Re-encode to MP4 (slower, ensures compatibility)</span>\nyt-dlp --recode-video mp4 <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"351,358"}}],"payload":{"tag":"h3","lines":"350,351"}},{"content":"9.3 SponsorBlock (Skip Sponsored Segments)","children":[{"content":"<pre data-lines=\"360,370\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Remove sponsor segments</span>\nyt-dlp --sponsorblock-remove sponsor <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Remove all non-content segments</span>\nyt-dlp --sponsorblock-remove all <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Mark sponsor segments as chapters (without removing)</span>\nyt-dlp --sponsorblock-mark sponsor <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"360,370"}}],"payload":{"tag":"h3","lines":"359,360"}},{"content":"9.4 Download Specific Time Range","children":[{"content":"<pre data-lines=\"372,379\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Download from 0:30 to 2:00</span>\nyt-dlp --download-sections <span class=\"hljs-string\">&quot;*00:00:30-00:02:00&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Download the first 60 seconds</span>\nyt-dlp --download-sections <span class=\"hljs-string\">&quot;*00:00:00-00:01:00&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"372,379"}}],"payload":{"tag":"h3","lines":"371,372"}}],"payload":{"tag":"h2","lines":"333,334"}},{"content":"10. Bilibili-specific Tips","children":[{"content":"10.1 Basic Download","children":[{"content":"<pre data-lines=\"385,388\"><code class=\"language-bash\">yt-dlp <span class=\"hljs-string\">&quot;https://www.bilibili.com/video/BVxxxxxxxx&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"385,388"}}],"payload":{"tag":"h3","lines":"384,385"}},{"content":"10.2 Download with Cookies (Fix HTTP 403 Error)","children":[{"content":"<pre data-lines=\"390,393\"><code class=\"language-bash\">yt-dlp --cookies-from-browser chrome <span class=\"hljs-string\">&quot;https://www.bilibili.com/video/BVxxxxxxxx&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"390,393"}}],"payload":{"tag":"h3","lines":"389,390"}},{"content":"10.3 Download Highest Quality","children":[{"content":"<pre data-lines=\"395,398\"><code class=\"language-bash\">yt-dlp --cookies-from-browser chrome -f <span class=\"hljs-string\">&quot;bestvideo+bestaudio/best&quot;</span> <span class=\"hljs-string\">&quot;BILIBILI_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"395,398"}}],"payload":{"tag":"h3","lines":"394,395"}},{"content":"10.4 Download Multi-part Videos / Collections","children":[{"content":"<pre data-lines=\"400,407\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Download all parts</span>\nyt-dlp --cookies-from-browser chrome <span class=\"hljs-string\">&quot;BILIBILI_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Download only parts 1 through 5</span>\nyt-dlp --cookies-from-browser chrome --playlist-items 1-5 <span class=\"hljs-string\">&quot;BILIBILI_URL&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"400,407"}}],"payload":{"tag":"h3","lines":"399,400"}}],"payload":{"tag":"h2","lines":"382,383"}},{"content":"11. Configuration File","children":[{"content":"Config File Locations","children":[{"content":"<strong>macOS/Linux</strong>: <code>~/.config/yt-dlp/config</code>","children":[],"payload":{"tag":"li","lines":"415,416"}},{"content":"<strong>Windows</strong>: <code>%APPDATA%\\yt-dlp\\config</code>","children":[],"payload":{"tag":"li","lines":"416,418"}}],"payload":{"tag":"h3","lines":"414,415"}},{"content":"Example Configuration","children":[{"content":"<pre data-lines=\"419,439\"><code class=\"language-ini\"># Default output path\n-o ~/Downloads/yt-dlp/%(channel)s/%(title)s.%(ext)s\n\n# Default best quality (max 1080p)\n-f bestvideo[height&lt;=1080]+bestaudio/best[height&lt;=1080]\n\n# Embed metadata and thumbnail\n--embed-metadata\n--embed-thumbnail\n\n# Use download archive to avoid re-downloading\n--download-archive ~/Downloads/yt-dlp/archive.txt\n\n# Use Chrome cookies\n--cookies-from-browser chrome\n\n# Rate limit to 5MB/s\n-r 5M\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"419,439"}}],"payload":{"tag":"h3","lines":"418,419"}}],"payload":{"tag":"h2","lines":"410,411"}},{"content":"12. Practical Combined Commands","children":[{"content":"<pre data-lines=\"444,464\"><code class=\"language-bash\"><span class=\"hljs-comment\"># Perfect download: 1080p + embedded subtitles/thumbnail/metadata</span>\nyt-dlp -f <span class=\"hljs-string\">&quot;bestvideo[height&lt;=1080]+bestaudio/best&quot;</span> \\\n  --embed-subs --write-auto-subs --sub-langs <span class=\"hljs-string\">&quot;zh-Hans,en&quot;</span> \\\n  --embed-thumbnail --embed-metadata --embed-chapters \\\n  -o <span class=\"hljs-string\">&quot;~/Downloads/%(title)s.%(ext)s&quot;</span> <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Batch download a music playlist as MP3</span>\nyt-dlp -x --audio-format mp3 --audio-quality 0 \\\n  --embed-thumbnail --embed-metadata \\\n  -o <span class=\"hljs-string\">&quot;~/Music/%(playlist_index)02d-%(title)s.%(ext)s&quot;</span> <span class=\"hljs-string\">&quot;PLAYLIST_URL&quot;</span>\n\n<span class=\"hljs-comment\"># Download the latest 10 videos from a channel</span>\nyt-dlp --playlist-end 10 \\\n  -o <span class=\"hljs-string\">&quot;~/Downloads/%(channel)s/%(upload_date)s-%(title)s.%(ext)s&quot;</span> \\\n  <span class=\"hljs-string\">&quot;https://www.youtube.com/@CHANNEL_NAME/videos&quot;</span>\n\n<span class=\"hljs-comment\"># Dump video metadata as JSON (no download)</span>\nyt-dlp --dump-json <span class=\"hljs-string\">&quot;VIDEO_URL&quot;</span> | python3 -m json.tool\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"444,464"}}],"payload":{"tag":"h2","lines":"442,443"}}],"payload":{"tag":"h1","lines":"0,1"}},{})</script>
